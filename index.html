<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="Vk2FA92dgNPJQv-x3462v7AV41qwHTJEhjQ6Tp-1IhI" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            line-height: 1.6;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Test Website</h1>
        <p>This is a simple test website ready to deploy!</p>
        <div style="margin: 30px 0; font-size: 2em; font-weight: bold; color: #667eea;">
            Clicks: <span id="clickCount">0</span>
        </div>
        <button class="button" id="clickBtn" style="border: none; cursor: pointer;">Click Me!</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4tZ9X0L5M6N7O8P9Q0R1S2T3U4V5W6X7",
            authDomain: "testclick-app.firebaseapp.com",
            projectId: "testclick-app",
            databaseURL: "https://testclick-app-default-rtdb.asia-southeast1.firebaseio.com",
            storageBucket: "testclick-app.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdefg123456"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const clickCountRef = ref(database, 'clickCount');

        onValue(clickCountRef, (snapshot) => {
            const clicks = snapshot.val() || 0;
            document.getElementById('clickCount').textContent = clicks;
        });

        document.getElementById('clickBtn').addEventListener('click', function() {
            onValue(clickCountRef, (snapshot) => {
                const currentClicks = snapshot.val() || 0;
                set(clickCountRef, currentClicks + 1);
            }, { onlyOnce: true });
        });
    </script>
</body>
</html>
